services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: schoolsense-postgres
    environment:
      POSTGRES_DB: schoolsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - schoolsense_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  schoolsense_pgdata:
